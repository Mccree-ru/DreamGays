<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>McCree Ru Manga</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: var(--tg-theme-bg-color, #ffffff);
            --text-color: var(--tg-theme-text-color, #222222);
            --hint-color: var(--tg-theme-hint-color, #888888);
            --link-color: var(--tg-theme-link-color, #248bcf);
            --card-bg: var(--tg-theme-secondary-bg-color, #f1f1f1);
            --button-color: var(--tg-theme-button-color, #248bcf);
            --button-text: var(--tg-theme-button-text-color, #ffffff);
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            margin: 0; 
            padding: 0;
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
        }

        .screen {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            overflow-y: auto;
            opacity: 0;
            pointer-events: none;
            transform: scale(0.98);
            transition: opacity 0.35s cubic-bezier(0.4, 0, 0.2, 1), transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            box-sizing: border-box;
        }

        .screen.active {
            opacity: 1;
            pointer-events: auto;
            transform: scale(1);
        }

        .main-container { 
            padding: 15px; 
            padding-bottom: 40px; 
            padding-top: 10px; 
            max-width: 1400px; 
            margin: 0 auto; 
            box-sizing: border-box;
        }

        /* ЕДИНАЯ ПАНЕЛЬ ДОНАТА */
        .promo-buttons-row {
            display: flex;
            margin-bottom: 15px;
        }
        .donate-btn {
            flex: 1;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            background: linear-gradient(135deg, #248bcf, #1a6fa5); color: #ffffff;
            border: none; padding: 14px; border-radius: 12px;
            font-size: 15px; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 12px rgba(36, 139, 207, 0.25); transition: transform 0.1s;
        }
        .donate-btn:active { transform: scale(0.98); }

        .genre-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }
        .genre-tab {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 10px;
            background-color: var(--card-bg);
            color: var(--text-color);
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s, color 0.2s;
            text-align: center;
        }
        .genre-tab.active {
            background-color: var(--button-color);
            color: var(--button-text);
        }
         
        .filter-panel { margin-bottom: 20px; display: flex; flex-direction: column; gap: 10px; }
        .filter-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
         
        select.author-select {
            background-color: var(--card-bg); color: var(--text-color); border: 1px solid var(--hint-color);
            padding: 8px 12px; border-radius: 8px; font-size: 14px; outline: none; flex-grow: 1; -webkit-appearance: none;
        }

        .reset-btn {
            background-color: var(--button-color); color: var(--button-text); border: none;
            padding: 8px 14px; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; display: none;
        }
        .active-filter-info { font-size: 13px; color: var(--link-color); font-weight: bold; }

        .catalog-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 12px; 
        }
         
        .manga-card { 
            background-color: var(--card-bg); border-radius: 12px; overflow: hidden; 
            display: flex; flex-direction: column; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); position: relative;
            color: var(--text-color);
            -webkit-user-select: none; 
            user-select: none;
        }
        .manga-card:active { transform: scale(0.97); }

        .manga-card.genre-bara { background-color: #1a1a1a !important; color: #ffffff !important; }
        .manga-card.genre-furry { background-color: #132136 !important; color: #ffffff !important; }

        .card-cover-wrap { width: 100%; padding-top: 140%; position: relative; background-color: #222; }
        .card-cover { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
         
        .card-status-badge {
            position: absolute; top: 6px; left: 6px; z-index: 5;
            background-color: rgba(0, 0, 0, 0.75); color: #24b353; padding: 4px 6px;
            border-radius: 6px; font-size: 10px; font-weight: bold; display: flex; align-items: center; gap: 4px;
            backdrop-filter: blur(4px);
        }

        .card-info { padding: 8px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; pointer-events: none; }
        .card-title-wrap { height: 2.5em; margin-bottom: 6px; display: flex; align-items: flex-start; overflow: hidden; }
        .card-title { font-size: 13px; font-weight: 600; margin: 0; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.25; }
         
        .meta-container { display: flex; flex-direction: column; gap: 4px; }
        .card-tags { display: flex; flex-wrap: wrap; gap: 3px; pointer-events: auto; }
         
        .tag { 
            font-size: 9px; background-color: rgba(36, 139, 207, 0.1); color: var(--link-color); 
            padding: 2px 5px; border-radius: 5px; font-weight: bold; text-transform: uppercase; 
        }
        .tag.selected { background-color: var(--link-color); color: #fff; }
         
        .tag-author {
            font-size: 9px; background-color: #ff7b00; color: #ffffff; 
            padding: 2px 5px; border-radius: 5px; font-weight: bold; display: inline-flex; align-items: center;
        }

        /* КОНТЕКСТНОЕ МЕНЮ */
        .context-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.5); z-index: 200;
            opacity: 0; pointer-events: none;
            transition: opacity 0.25s ease;
        }
        .context-overlay.active { opacity: 1; pointer-events: auto; }

        .context-menu {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background-color: var(--bg-color);
            border-top-left-radius: 16px; border-top-right-radius: 16px;
            z-index: 201; box-sizing: border-box; padding: 16px;
            transform: translateY(100%);
            transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 -4px 16px rgba(0,0,0,0.15);
            max-width: 600px; margin: 0 auto; right: 0; 
        }
        .context-menu.active { transform: translateY(0); }

        .context-menu-title {
            font-size: 14px; font-weight: bold; color: var(--hint-color);
            margin-bottom: 14px; text-align: center;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }

        .context-menu-btn {
            width: 100%; padding: 14px; border: none; border-radius: 12px;
            font-size: 16px; font-weight: 600; cursor: pointer;
            text-align: center; display: flex; align-items: center; justify-content: center; gap: 8px;
            background-color: var(--card-bg); color: var(--text-color);
            transition: background-color 0.1s; margin-bottom: 8px;
        }
        .context-menu-btn:active { background-color: rgba(0, 0, 0, 0.08); }
        .context-menu-btn.action-toggle { background-color: var(--button-color); color: var(--button-text); }
        .context-menu-btn.action-share { background-color: #31b54a; color: #ffffff; }
        .context-menu-btn.btn-close { background-color: transparent; color: var(--link-color); margin-bottom: 0; }

        /* ЧИТАЛКА */
        .reader-screen {
            background-color: #000000; overflow: hidden;
        }

        .reader-header {
            position: fixed; top: 0; left: 0; width: 100%; height: 60px;
            z-index: 100; display: flex; align-items: center; justify-content: space-between;
            background-color: rgba(0, 0, 0, 0.65); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            box-sizing: border-box; padding: 0 12px;
            opacity: 0; pointer-events: none; 
            transition: opacity 0.3s ease, transform 0.3s ease;
            transform: translateY(-10px);
        }
        .reader-header.visible { opacity: 1; pointer-events: auto; transform: translateY(0); }

        .back-button-plate {
            background-color: rgba(255, 255, 255, 0.12); border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff; padding: 8px 14px; border-radius: 10px;
            font-size: 13px; font-weight: bold; cursor: pointer;
        }

        .page-counter { color: #ffffff; font-size: 14px; font-weight: bold; background-color: rgba(0, 0, 0, 0.4); padding: 6px 10px; border-radius: 8px; }

        .reader-progress-container {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 4px;
            background-color: rgba(255, 255, 255, 0.1); z-index: 99;
            opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        .reader-progress-container.visible { opacity: 1; }
        .reader-progress-bar { height: 100%; width: 0%; background-color: var(--button-color); transition: width 0.2s ease; }

        .reader-track {
            display: flex; height: 100%; width: 100%;
            transition: transform 0.25s ease-out; will-change: transform;
        }

        .reader-slide {
            flex: 0 0 100vw; width: 100vw; height: 100%;
            display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden;
        }

        .zoom-container {
            width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
            will-change: transform; transform-origin: center center;
            transition: transform 0.1s ease-out;
        }

        .reader-img { width: 100%; height: 100%; object-fit: contain; pointer-events: none; }

        /* Зоны тапов поверх картинок */
        .tap-zone-left { position: absolute; top: 0; left: 0; width: 20%; height: 100%; z-index: 40; }
        .tap-zone-center { position: absolute; top: 0; left: 20%; width: 60%; height: 100%; z-index: 41; }
        .tap-zone-right { position: absolute; top: 0; right: 0; width: 20%; height: 100%; z-index: 40; }

        @media screen and (min-width: 480px) { .catalog-grid { grid-template-columns: repeat(3, 1fr); } }
        @media screen and (min-width: 720px) { .catalog-grid { grid-template-columns: repeat(4, 1fr); } .zoom-container { max-width: 650px; } }
        @media screen and (min-width: 960px) { .catalog-grid { grid-template-columns: repeat(5, 1fr); } }
    </style>
</head>
<body>

    <div id="readerHeader" class="reader-header">
        <button class="back-button-plate" onclick="closeReader(event)">⬅ В каталог</button>
        <div id="pageCounter" class="page-counter">0 / 0</div>
    </div>

    <div id="readerProgress" class="reader-progress-container">
        <div id="readerProgressBar" class="reader-progress-bar"></div>
    </div>

    <div id="mainScreen" class="screen active">
        <div class="main-container">

            <!-- КНОПКА ДОНАТА НА ВСЮ ШИРИНУ -->
            <div class="promo-buttons-row">
                <button class="donate-btn" onclick="tg.openLink('https://yoomoney.ru/to/4100117500602780')">
                    ☕ Поддержать команду (На кофе)
                </button>
            </div>

            <div class="genre-tabs">
                <button id="tab-all" class="genre-tab active" onclick="switchGenreTab(null)">Все</button>
                <button id="tab-bara" class="genre-tab" onclick="switchGenreTab('bara')">Bara</button>
                <button id="tab-furry" class="genre-tab" onclick="switchGenreTab('furry')">Furry</button>
            </div>

            <div class="filter-panel">
                <div class="filter-row">
                    <select id="authorSelect" class="author-select" onchange="filterByAuthor(this.value)">
                        <option value="">Все авторы</option>
                    </select>
                    <button id="resetBtn" class="reset-btn" onclick="resetFilters()">Сбросить</button>
                </div>
                <div id="activeFilterText" class="active-filter-info"></div>
            </div>

            <div class="catalog-grid" id="catalog"></div>
        </div>
    </div>

    <div id="readerScreen" class="screen reader-screen">
        <div id="readerTrack" class="reader-track"></div>
    </div>

    <div id="contextOverlay" class="context-overlay" onclick="closeContextMenu()">
        <div id="contextMenu" class="context-menu" onclick="event.stopPropagation()">
            <div id="contextTitle" class="context-menu-title">Название тайтла</div>
            <button id="contextToggleBtn" class="context-menu-btn action-toggle" onclick="handleStatusToggle()"></button>
            <button class="context-menu-btn action-share" onclick="handleShareManga()">🔗 Поделиться тайтлом</button>
            <button class="context-menu-btn btn-close" onclick="closeContextMenu()">Отмена</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        // Укажи здесь точный юзернейм своего бота (без @)
        const BOT_USERNAME = "McCreeRuMangaBot"; 

        let allManga = []; 
        let selectedTag = null;
        let selectedAuthor = "";
        let selectedGenreTab = null;

        let currentMangaId = null;
        let currentPagesCount = 0;
        let currentPageIndex = 0;
        let isMangaFinishedAlertShown = false;

        // ПЕРЕМЕННЫЕ ДЛЯ СВАЙПОВ И ЗУМА
        let scale = 1;
        let startX = 0, startY = 0;
        let moveX = 0, moveY = 0;
        let initialPinchDist = 0;
        let isPanning = false;
        let isZoomMode = false;
        let swipeStartX = 0;

        let uiTimeout = null;
        let lastTapTime = 0; 
        let contextActiveMangaId = null; 
        let readMangaList = JSON.parse(localStorage.getItem('manga_read_list')) || [];

        // Глобальный пул для фонового кэширования
        let preloadedImagesPool = [];

        fetch('database.json?v=' + new Date().getTime())
            .then(response => response.json())
            .then(data => {
                allManga = data;
                buildAuthorSelect(); 
                renderCatalog();     

                if (tg.initDataUnsafe && tg.initDataUnsafe.start_param) {
                    const startId = tg.initDataUnsafe.start_param;
                    if (allManga.some(m => m.id === startId)) openReader(startId);
                }
            })
            .catch(err => console.error("Ошибка загрузки БД", err));

        function buildAuthorSelect() {
            const select = document.getElementById('authorSelect');
            const authorsSet = new Set();
            allManga.forEach(manga => {
                if (manga.author) {
                    manga.author.split(/[,/]| и /).forEach(a => { const t = a.trim(); if(t) authorsSet.add(t); });
                }
            });
            authorsSet.forEach(author => {
                const opt = document.createElement('option'); opt.value = author; opt.textContent = author; select.appendChild(opt);
            });
        }

        function switchGenreTab(genre) {
            selectedGenreTab = genre;
            document.querySelectorAll('.genre-tab').forEach(tab => tab.classList.remove('active'));
            if (genre === null) document.getElementById('tab-all').classList.add('active');
            else if (genre === 'bara') document.getElementById('tab-bara').classList.add('active');
            else if (genre === 'furry') document.getElementById('tab-furry').classList.add('active');
            renderCatalog();
        }

        function renderCatalog() {
            const catalog = document.getElementById('catalog');
            catalog.innerHTML = ""; 

            const filtered = allManga.filter(manga => {
                const matchTag = !selectedTag || manga.tags.includes(selectedTag);
                const matchAuthor = !selectedAuthor || (manga.author && manga.author.includes(selectedAuthor));
                const matchGenreTab = !selectedGenreTab || manga.tags.some(t => t.toLowerCase() === selectedGenreTab);
                return matchTag && matchAuthor && matchGenreTab;
            });

            filtered.forEach(manga => {
                const card = document.createElement('div');
                let genreClass = '';
                if (manga.tags.some(t => t.toLowerCase() === 'bara')) genreClass = 'genre-bara';
                else if (manga.tags.some(t => t.toLowerCase() === 'furry')) genreClass = 'genre-furry';
                
                card.className = `manga-card ${genreClass}`;
                setupLongPress(card, manga.id);

                const visibleTags = manga.tags.filter(t => t.toLowerCase() !== 'bara' && t.toLowerCase() !== 'furry');
                const tagsHtml = visibleTags.map(t => `<span class="tag ${t === selectedTag ? 'selected' : ''}" onclick="event.stopPropagation(); filterByTag('${t}')">${t}</span>`).join('');
                const authorsHtml = manga.author ? manga.author.split(/[,/]| и /).map(a => `<span class="tag-author" onclick="event.stopPropagation(); filterByAuthorTag('${a.trim()}')">${a.trim()}</span>`).join(' ') : '';

                let statusBadge = readMangaList.includes(manga.id) ? `<div class="card-status-badge">✅ Прочитано</div>` : '';

                card.innerHTML = `
                    ${statusBadge}
                    <div class="card-cover-wrap"><img src="${manga.cover}" class="card-cover" loading="lazy"></div>
                    <div class="card-info">
                        <div class="card-title-wrap"><h3 class="card-title">${manga.title}</h3></div>
                        <div class="meta-container">
                            <div class="card-tags">${authorsHtml}</div>
                            <div class="card-tags">${tagsHtml}</div>
                        </div>
                    </div>
                `;
                catalog.appendChild(card);
            });
            updateResetButtonVisibility();
        }

        function setupLongPress(element, mangaId) {
            let pressTimer = null; let isLongPress = false; let isMoving = false;
            let sX = 0, sY = 0;

            element.addEventListener('touchstart', (e) => {
                isLongPress = false; isMoving = false;
                sX = e.touches[0].clientX; sY = e.touches[0].clientY;
                pressTimer = setTimeout(() => {
                    if (!isMoving) {
                        isLongPress = true;
                        if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium'); 
                        openContextMenu(mangaId);
                    }
                }, 600);
            }, { passive: true });

            element.addEventListener('touchmove', (e) => {
                if (Math.abs(e.touches[0].clientX - sX) > 10 || Math.abs(e.touches[0].clientY - sY) > 10) {
                    isMoving = true; clearTimeout(pressTimer);
                }
            }, { passive: true });

            element.addEventListener('touchend', (e) => {
                clearTimeout(pressTimer);
                if (!isLongPress && !isMoving && !e.target.classList.contains('tag') && !e.target.classList.contains('tag-author')) {
                    openReader(mangaId);
                }
            });
        }

        function openContextMenu(mangaId) {
            const manga = allManga.find(m => m.id === mangaId);
            if (!manga) return;
            contextActiveMangaId = mangaId;
            document.getElementById('contextTitle').textContent = manga.title;
            document.getElementById('contextToggleBtn').innerHTML = readMangaList.includes(mangaId) ? "❌ Убрать из прочитанного" : "✅ Отметить прочитанным";
            document.getElementById('contextOverlay').classList.add('active');
            document.getElementById('contextMenu').classList.add('active');
        }

        function closeContextMenu() {
            document.getElementById('contextOverlay').classList.remove('active');
            document.getElementById('contextMenu').classList.remove('active');
        }

        function handleStatusToggle() {
            if (!contextActiveMangaId) return;
            const idx = readMangaList.indexOf(contextActiveMangaId);
            if (idx > -1) readMangaList.splice(idx, 1); else readMangaList.push(contextActiveMangaId);
            localStorage.setItem('manga_read_list', JSON.stringify(readMangaList));
            closeContextMenu(); renderCatalog(); 
        }

        // ИСПРАВЛЕННЫЙ МЕТОД: Поделиться тайтлом через прямую t.me ссылку
        function handleShareManga() {
            if (!contextActiveMangaId) return;
            const link = `https://t.me/${BOT_USERNAME}/app?startapp=${contextActiveMangaId}`;
            tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(link)}`);
            closeContextMenu();
        }

        function filterByAuthorTag(name) { selectedAuthor = selectedAuthor === name ? "" : name; document.getElementById('authorSelect').value = selectedAuthor; renderCatalog(); }
        function filterByTag(tag) { selectedTag = selectedTag === tag ? null : tag; renderCatalog(); }
        function filterByAuthor(author) { selectedAuthor = author; renderCatalog(); }
        function resetFilters() { selectedTag = null; selectedAuthor = ""; selectedGenreTab = null; document.getElementById('authorSelect').value = ""; switchGenreTab(null); }
        
        function updateResetButtonVisibility() {
            const resetBtn = document.getElementById('resetBtn');
            const infoText = document.getElementById('activeFilterText');
            if (selectedTag || selectedAuthor || selectedGenreTab) {
                resetBtn.style.display = "block";
                infoText.textContent = `Фильтр: ${selectedGenreTab ? '['+selectedGenreTab.toUpperCase()+']' : ''} ${selectedAuthor ? '['+selectedAuthor+']' : ''} ${selectedTag ? '[#'+selectedTag+']' : ''}`;
            } else { resetBtn.style.display = "none"; infoText.textContent = ""; }
        }

        /* НАЧАЛО ЧИТАЛКИ И ЛОГИКИ СВАЙПОВ/ЗУМА */
        function openReader(mangaId) {
            const manga = allManga.find(m => m.id === mangaId);
            if (!manga || !manga.pages || manga.pages.length === 0) return;

            currentMangaId = mangaId;
            currentPagesCount = manga.pages.length;
            currentPageIndex = 0;
            isMangaFinishedAlertShown = false;

            // ФОНОВАЯ КЭШ-ЗАГРУЗКА ВСЕХ СТРАНИЦ СРАЗУ
            preloadedImagesPool = [];
            manga.pages.forEach(url => {
                const img = new Image();
                img.src = url;
                preloadedImagesPool.push(img);
            });

            const track = document.getElementById('readerTrack');
            track.innerHTML = ""; 

            manga.pages.forEach((pageUrl, index) => {
                const slide = document.createElement('div');
                slide.className = 'reader-slide';
                slide.innerHTML = `
                    <div class="tap-zone-left" onclick="handleZoneTap('left', event)"></div>
                    <div class="tap-zone-center" onclick="handleZoneTap('center', event)"></div>
                    <div class="tap-zone-right" onclick="handleZoneTap('right', event)"></div>
                    <div class="zoom-container" id="zoom-${index}">
                        <img class="reader-img" src="${pageUrl}">
                    </div>
                `;
                track.appendChild(slide);
            });

            document.getElementById('mainScreen').classList.remove('active');
            document.getElementById('readerScreen').classList.add('active');
            
            resetZoom();
            updatePageCounter();
            resetUiTimer();
            initTouchEvents();
        }

        function closeReader(e) {
            if (e) e.stopPropagation();
            clearTimeout(uiTimeout);
            document.getElementById('readerScreen').classList.remove('active');
            document.getElementById('readerHeader').classList.remove('visible');
            document.getElementById('readerProgress').classList.remove('visible');
            document.getElementById('mainScreen').classList.add('active');
            currentMangaId = null;
        }

        function handleZoneTap(zoneType, event) {
            if (event) event.stopPropagation();
            if (scale > 1) return; 

            const currentTime = new Date().getTime();
            if (currentTime - lastTapTime < 250) {
                // Двойной тап — сброс/увеличение x2
                lastTapTime = 0;
                toggleDoubleTapZoom(event);
                return;
            }
            lastTapTime = currentTime;

            setTimeout(() => {
                if (lastTapTime === 0 || scale > 1) return;
                if (zoneType === 'left') changePage(-1);
                else if (zoneType === 'right') changePage(1);
                else if (zoneType === 'center') {
                    const header = document.getElementById('readerHeader');
                    header.classList.contains('visible') ? hideUi() : showUi();
                }
            }, 250);
        }

        function toggleDoubleTapZoom(event) {
            const container = document.getElementById(`zoom-${currentPageIndex}`);
            if (!container) return;
            if (scale > 1) {
                resetZoom();
            } else {
                scale = 2.0;
                container.style.transform = `scale(${scale})`;
                isZoomMode = true;
                hideUi();
            }
        }

        function changePage(direction) {
            const newIndex = currentPageIndex + direction;
            if (newIndex >= 0 && newIndex < currentPagesCount) {
                currentPageIndex = newIndex;
                updateTrackPosition();
                resetZoom();
            } else if (newIndex >= currentPagesCount && !isMangaFinishedAlertShown) {
                isMangaFinishedAlertShown = true;
                tg.showAlert("Вы прочитали этот тайтл до конца! 🎉", () => {
                    if (!readMangaList.includes(currentMangaId)) {
                        readMangaList.push(currentMangaId);
                        localStorage.setItem('manga_read_list', JSON.stringify(readMangaList));
                        renderCatalog();
                    }
                    closeReader();
                });
            }
        }

        function updateTrackPosition() {
            const track = document.getElementById('readerTrack');
            track.style.transform = `translate3d(-${currentPageIndex * 100}vw, 0px, 0px)`;
            updatePageCounter();
        }

        function updatePageCounter() {
            const currentNumber = currentPageIndex + 1;
            document.getElementById('pageCounter').textContent = `${currentNumber} / ${currentPagesCount}`;
            document.getElementById('readerProgressBar').style.width = `${(currentNumber / currentPagesCount) * 100}%`;
        }

        function resetZoom() {
            scale = 1; moveX = 0; moveY = 0; isZoomMode = false; isPanning = false;
            const container = document.getElementById(`zoom-${currentPageIndex}`);
            if (container) container.style.transform = `translate3d(0px, 0px, 0px) scale(1)`;
        }

        // НАУЧИЛИ ЧИТАЛКУ СВАЙПАМ И MULTI-TOUCH ЗУМУ НА ОСНОВЕ ТАЧЕЙ
        function initTouchEvents() {
            const reader = document.getElementById('readerScreen');
            
            reader.addEventListener('touchstart', (e) => {
                if (e.touches.length === 1) {
                    // Одиночный тач — для свайпов или панорамирования увеличенной картинки
                    startX = e.touches[0].clientX - moveX;
                    startY = e.touches[0].clientY - moveY;
                    swipeStartX = e.touches[0].clientX;
                    if (scale > 1) isPanning = true;
                } else if (e.touches.length === 2) {
                    // Двойной тач — Pinch to Zoom
                    isPanning = false;
                    initialPinchDist = Math.hypot(
                        e.touches[0].clientX - e.touches[1].clientX,
                        e.touches[0].clientY - e.touches[1].clientY
                    );
                }
            }, { passive: true });

            reader.addEventListener('touchmove', (e) => {
                const container = document.getElementById(`zoom-${currentPageIndex}`);
                if (!container) return;

                if (e.touches.length === 1) {
                    if (isPanning) {
                        // Двигаем увеличенную область
                        moveX = e.touches[0].clientX - startX;
                        moveY = e.touches[0].clientY - startY;
                        container.style.transform = `translate3d(${moveX}px, ${moveY}px, 0px) scale(${scale})`;
                    }
                } else if (e.touches.length === 2) {
                    // Масштабируем двумя пальцами
                    const currentDist = Math.hypot(
                        e.touches[0].clientX - e.touches[1].clientX,
                        e.touches[0].clientY - e.touches[1].clientY
                    );
                    const factor = currentDist / initialPinchDist;
                    scale = Math.min(Math.max(1, scale * factor), 4); // Ограничение масштаба от х1 до х4
                    initialPinchDist = currentDist;
                    container.style.transform = `translate3d(${moveX}px, ${moveY}px, 0px) scale(${scale})`;
                    
                    if (scale > 1) { isZoomMode = true; hideUi(); } else { isZoomMode = false; }
                }
            }, { passive: true });

            reader.addEventListener('touchend', (e) => {
                isPanning = false;
                if (scale === 1 && e.touches.length === 0) {
                    // Расчёт свайпа страниц влево/вправо
                    const diffX = e.changedTouches[0].clientX - swipeStartX;
                    if (Math.abs(diffX) > 60) { // Чувствительность свайпа
                        if (diffX > 0) changePage(-1); // Свайп вправо -> Прошлая страница
                        else changePage(1);            // Свайп влево -> Следующая страница
                    }
                }
            }, { passive: true });
        }

        function resetUiTimer() { if (scale > 1) return; showUi(); clearTimeout(uiTimeout); uiTimeout = setTimeout(hideUi, 2500); }
        function showUi() { if (scale > 1) return; document.getElementById('readerHeader').classList.add('visible'); document.getElementById('readerProgress').classList.add('visible'); }
        function hideUi() { document.getElementById('readerHeader').classList.remove('visible'); document.getElementById('readerProgress').classList.remove('visible'); }
    </script>
</body>
</html>
