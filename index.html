<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>McCree Ru Manga</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: var(--tg-theme-bg-color, #ffffff);
            --text-color: var(--tg-theme-text-color, #222222);
            --hint-color: var(--tg-theme-hint-color, #888888);
            --link-color: var(--tg-theme-link-color, #248bcf);
            --card-bg: var(--tg-theme-secondary-bg-color, #f1f1f1);
        }
        body { font-family: sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 15px; }
        h1.main-title { font-size: 20px; text-align: center; margin-bottom: 20px; }
        .catalog-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .manga-card { background-color: var(--card-bg); border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; cursor: pointer; transition: transform 0.1s; }
        .manga-card:active { transform: scale(0.97); }
        .card-cover-wrap { width: 100%; padding-top: 140%; position: relative; background-color: #333; }
        .card-cover { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .card-info { padding: 10px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .card-title { font-size: 14px; font-weight: 600; margin: 0 0 5px 0; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .card-author { font-size: 12px; color: var(--hint-color); margin-bottom: 8px; }
        .card-tags { display: flex; flex-wrap: wrap; gap: 4px; }
        .tag { font-size: 10px; background-color: rgba(36, 139, 207, 0.15); color: var(--link-color); padding: 2px 6px; border-radius: 4px; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>

    <h1 class="main-title">Каталог переводов</h1>
    <div class="catalog-grid" id="catalog">
        </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Загружаем список манги из файла database.json
        fetch('database.json')
            .then(response => response.json())
            .then(data => {
                const catalog = document.getElementById('catalog');
                data.forEach(manga => {
                    const tagsHtml = manga.tags.map(t => `<span class="tag">${t}</span>`).join('');
                    const card = document.createElement('div');
                    card.className = 'manga-card';
                    card.onclick = () => tg.openLink(manga.link);
                    card.innerHTML = `
                        <div class="card-cover-wrap">
                            <img src="${manga.cover}" class="card-cover" loading="lazy">
                        </div>
                        <div class="card-info">
                            <div>
                                <h3 class="card-title">${manga.title}</h3>
                                <div class="card-author">Автор: ${manga.author}</div>
                            </div>
                            <div class="card-tags">${tagsHtml}</div>
                        </div>
                    `;
                    catalog.appendChild(card);
                });
            })
            .catch(err => console.error("Ошибка загрузки базы данных", err));
    </script>
</body>
</html>
