<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест WebApp</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: system-ui;
            padding: 20px;
            background: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
        }
        button {
            background: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            margin: 10px 0;
            width: 100%;
        }
        button:active { transform: scale(0.97); }
        #response {
            margin-top: 20px;
            padding: 15px;
            background: var(--tg-theme-secondary-bg-color);
            border-radius: 10px;
            font-size: 14px;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <h2>🧪 Тест отправки данных</h2>
    <p>Нажмите кнопку, чтобы отправить данные в бота</p>
    
    <button onclick="sendTestData()">📤 Отправить тестовые данные</button>
    <button onclick="sendLikeData()">❤️ Отправить лайк</button>
    
    <div id="response">Ответ от бота появится здесь...</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        function sendToBot(data) {
            // Отправляем данные в бота
            tg.sendData(JSON.stringify(data));
            
            document.getElementById('response').innerHTML = 
                `⏳ Отправлено: <pre>${JSON.stringify(data, null, 2)}</pre>`;
        }

        function sendTestData() {
            sendToBot({
                action: 'test',
                message: 'Привет от WebApp!',
                timestamp: new Date().toISOString()
            });
        }

        function sendLikeData() {
            const userId = tg.initDataUnsafe?.user?.id || 'anonymous';
            sendToBot({
                action: 'toggle_like',
                manga_id: 'test_manga_123',
                user_id: userId,
                timestamp: new Date().toISOString()
            });
        }

        // Обработка ответа от бота
        tg.onEvent('webAppData', (data) => {
            try {
                const response = JSON.parse(data);
                document.getElementById('response').innerHTML = 
                    `✅ Ответ от бота: <pre>${JSON.stringify(response, null, 2)}</pre>`;
            } catch (e) {
                document.getElementById('response').innerHTML = 
                    `❌ Ошибка: ${e.message}`;
            }
        });

        // Логируем информацию о пользователе
        console.log('User:', tg.initDataUnsafe?.user);
        console.log('WebApp data:', tg.initData);
    </script>
</body>
</html>
