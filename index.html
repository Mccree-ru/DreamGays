<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>McCree Ru Manga</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* НАСТРОЙКА ЦВЕТОВ ПОД ТЕМУ TELEGRAM */
        :root {
            --bg-color: var(--tg-theme-bg-color, #ffffff);
            --text-color: var(--tg-theme-text-color, #222222);
            --hint-color: var(--tg-theme-hint-color, #888888);
            --link-color: var(--tg-theme-link-color, #248bcf);
            --card-bg: var(--tg-theme-secondary-bg-color, #f1f1f1);
            --button-color: var(--tg-theme-button-color, #248bcf);
            --button-text: var(--tg-theme-button-text-color, #ffffff);
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            margin: 0; 
            padding: 0;
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
        }

        /* АНИМАЦИЯ ДЛЯ ЭКРАНОВ */
        .screen {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            overflow-y: auto;
            opacity: 0;
            pointer-events: none;
            transform: scale(0.98);
            transition: opacity 0.35s cubic-bezier(0.4, 0, 0.2, 1), transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            box-sizing: border-box;
        }

        .screen.active {
            opacity: 1;
            pointer-events: auto;
            transform: scale(1);
        }

        /* КОНТЕЙНЕР КАТАЛОГА С ОГРАНИЧЕНИЕМ ШИРИНЫ НА ПК */
        .main-container { 
            padding: 15px; 
            padding-bottom: 40px; 
            padding-top: 10px; 
            max-width: 1400px; 
            margin: 0 auto; 
            box-sizing: border-box;
        }

        /* Кнопка Доната в каталоге */
        .donate-btn {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            background: linear-gradient(135deg, #8b3ffd, #5411ff); color: #ffffff;
            border: none; width: 100%; padding: 12px; border-radius: 12px;
            font-size: 15px; font-weight: bold; cursor: pointer; margin-bottom: 15px;
            box-shadow: 0 4px 12px rgba(139, 63, 253, 0.3); transition: transform 0.1s;
        }
        .donate-btn:active { transform: scale(0.98); }

        /* БЫСТРЫЕ ФИЛЬТРЫ ЖАНРОВ */
        .genre-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }
        .genre-tab {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 10px;
            background-color: var(--card-bg);
            color: var(--text-color);
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s, color 0.2s;
            text-align: center;
        }
        .genre-tab.active {
            background-color: var(--button-color);
            color: var(--button-text);
        }
         
        /* Панель фильтров */
        .filter-panel { margin-bottom: 20px; display: flex; flex-direction: column; gap: 10px; }
        .filter-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
         
        select.author-select {
            background-color: var(--card-bg); color: var(--text-color); border: 1px solid var(--hint-color);
            padding: 8px 12px; border-radius: 8px; font-size: 14px; outline: none; flex-grow: 1; -webkit-appearance: none;
        }

        .reset-btn {
            background-color: var(--button-color); color: var(--button-text); border: none;
            padding: 8px 14px; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; display: none;
        }
        .active-filter-info { font-size: 13px; color: var(--link-color); font-weight: bold; }

        /* АДАПТИВНАЯ СЕТКА КАТАЛОГА */
        .catalog-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 12px; 
        }
         
        /* КАРТОЧКИ ТАЙТЛОВ */
        .manga-card { 
            background-color: var(--card-bg); border-radius: 12px; overflow: hidden; 
            display: flex; flex-direction: column; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); position: relative;
            color: var(--text-color);
            -webkit-user-select: none; /* Защита от выделения текста при долгом нажатии */
            user-select: none;
        }
        .manga-card:active { transform: scale(0.97); }

        @media (hover: hover) {
            .manga-card:hover {
                transform: translateY(-3px);
                box-shadow: 0 6px 16px rgba(0,0,0,0.15);
            }
        }

        .manga-card.genre-bara { background-color: #1a1a1a !important; color: #ffffff !important; }
        .manga-card.genre-furry { background-color: #132136 !important; color: #ffffff !important; }

        .card-cover-wrap { width: 100%; padding-top: 140%; position: relative; background-color: #222; }
        .card-cover { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
         
        /* Индикатор прочитанного */
        .card-status-badge {
            position: absolute; top: 6px; left: 6px; z-index: 5;
            background-color: rgba(0, 0, 0, 0.75); color: #24b353; padding: 4px 6px;
            border-radius: 6px; font-size: 10px; font-weight: bold; display: flex; align-items: center; gap: 4px;
            backdrop-filter: blur(4px);
        }

        .card-info { padding: 8px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; pointer-events: none; }
        .card-title { font-size: 13px; font-weight: 600; margin: 0 0 6px 0; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.25; }
         
        /* Метаданные */
        .meta-container { display: flex; flex-direction: column; gap: 4px; }
        .card-tags { display: flex; flex-wrap: wrap; gap: 3px; pointer-events: auto; }
         
        .tag { 
            font-size: 9px; background-color: rgba(36, 139, 207, 0.1); color: var(--link-color); 
            padding: 2px 5px; border-radius: 5px; font-weight: bold; text-transform: uppercase; 
        }
        .tag.selected { background-color: var(--link-color); color: #fff; }
         
        .tag-author {
            font-size: 9px; background-color: #ff7b00; color: #ffffff; 
            padding: 2px 5px; border-radius: 5px; font-weight: bold; display: inline-flex; align-items: center;
        }
        .tag-author.selected { background-color: #cc6200; }

        /* ========================================== */
        /* КОНТЕКСТНОЕ МЕНЮ (BOTTOM SHEET) */
        /* ========================================== */
        .context-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.5); z-index: 200;
            opacity: 0; pointer-events: none;
            transition: opacity 0.25s ease;
        }
        .context-overlay.active { opacity: 1; pointer-events: auto; }

        .context-menu {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background-color: var(--bg-color);
            border-top-left-radius: 16px; border-top-right-radius: 16px;
            z-index: 201; box-sizing: border-box; padding: 16px;
            transform: translateY(100%);
            transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 -4px 16px rgba(0,0,0,0.15);
            max-width: 600px; margin: 0 auto; right: 0; /* Ограничение ширины на планшетах/ПК */
        }
        .context-menu.active { transform: translateY(0); }

        .context-menu-title {
            font-size: 14px; font-weight: bold; color: var(--hint-color);
            margin-bottom: 14px; text-align: center;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }

        .context-menu-btn {
            width: 100%; padding: 14px; border: none; border-radius: 12px;
            font-size: 16px; font-weight: 600; cursor: pointer;
            text-align: center; display: flex; align-items: center; justify-content: center; gap: 8px;
            background-color: var(--card-bg); color: var(--text-color);
            transition: background-color 0.1s; margin-bottom: 8px;
        }
        .context-menu-btn:active { background-color: rgba(0, 0, 0, 0.08); }
        .context-menu-btn.action-toggle { background-color: var(--button-color); color: var(--button-text); }

        .context-menu-btn.btn-close {
            background-color: transparent; color: var(--link-color); margin-bottom: 0; font-weight: normal;
        }

        /* ========================================== */
        /* ЧИТАЛКА */
        /* ========================================== */
        .reader-screen {
            background-color: #000000; overflow: hidden; touch-action: none;
        }

        .reader-header {
            position: fixed; top: 0; left: 0; width: 100%; height: 60px;
            z-index: 100; display: flex; align-items: center; justify-content: space-between;
            background-color: rgba(0, 0, 0, 0.65); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            box-sizing: border-box; padding: 0 12px;
            opacity: 0; pointer-events: none; 
            transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1), transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateY(-10px);
        }
        .reader-header.visible { opacity: 1; pointer-events: auto; transform: translateY(0); }

        .back-button-plate {
            background-color: rgba(255, 255, 255, 0.12); border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff; padding: 8px 14px; border-radius: 10px;
            font-size: 13px; font-weight: bold; cursor: pointer;
            transition: background-color 0.15s; display: inline-flex; align-items: center; gap: 4px;
        }
        .back-button-plate:active { background-color: rgba(255, 255, 255, 0.25); }

        .reader-nav-right { display: flex; align-items: center; gap: 10px; }
        .page-counter { color: #ffffff; font-size: 14px; font-weight: bold; opacity: 0.95; background-color: rgba(0, 0, 0, 0.4); padding: 6px 10px; border-radius: 8px; }

        .reader-donate-btn {
            background: linear-gradient(135deg, #ff9500, #ff5e00); color: #ffffff; border: none; padding: 7px 12px; border-radius: 8px;
            font-size: 12px; font-weight: bold; cursor: pointer; box-shadow: 0 2px 8px rgba(255, 149, 0, 0.3); transition: transform 0.1s; display: flex; align-items: center; gap: 4px;
        }
        .reader-donate-btn:active { transform: scale(0.95); }

        .reader-track {
            display: flex; height: 100%; width: 100%;
            transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1); will-change: transform;
        }

        .reader-slide {
            flex: 0 0 100vw; width: 100vw; height: 100%;
            display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden;
        }

        .zoom-container {
            width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
            will-change: transform; transform-origin: center center;
            margin: 0 auto;
        }

        .reader-img { width: 100%; height: 100%; object-fit: contain; user-select: none; -webkit-user-drag: none; }

        /* ИНТЕРАКТИВНЫЕ ЗОНЫ НАЖАТИЯ */
        .tap-zone-left { position: absolute; top: 0; left: 0; width: 25%; height: 100%; z-index: 40; }
        .tap-zone-center { position: absolute; top: 0; left: 25%; width: 50%; height: 100%; z-index: 41; }
        .tap-zone-right { position: absolute; top: 0; right: 0; width: 25%; height: 100%; z-index: 40; }


        /* ======================================================= */
        /* МЕДИА-ЗАПРОСЫ: КОМПАКТНОСТЬ И ОГРАНИЧЕНИЯ ДЛЯ ПК */
        /* ======================================================= */
        @media screen and (min-width: 480px) {
            .catalog-grid { grid-template-columns: repeat(3, 1fr); gap: 12px; }
        }
        @media screen and (min-width: 720px) {
            .catalog-grid { grid-template-columns: repeat(4, 1fr); gap: 15px; }
            .card-title { font-size: 14px; }
            .zoom-container { max-width: 650px; }
        }
        @media screen and (min-width: 960px) {
            .catalog-grid { grid-template-columns: repeat(5, 1fr); }
        }
        @media screen and (min-width: 1140px) {
            .catalog-grid { grid-template-columns: repeat(6, 1fr); }
        }
        @media screen and (min-width: 1350px) {
            .catalog-grid { grid-template-columns: repeat(7, 1fr); }
        }
    </style>
</head>
<body>

    <div id="readerHeader" class="reader-header">
        <button class="back-button-plate" onclick="closeReader(event)">⬅ В каталог</button>
        <div class="reader-nav-right">
            <button class="reader-donate-btn" onclick="event.stopPropagation(); tg.openLink('https://yoomoney.ru/to/4100117500602780')">
                ☕ На кофе
            </button>
            <div id="pageCounter" class="page-counter">0 / 0</div>
        </div>
    </div>

    <div id="mainScreen" class="screen active">
        <div class="main-container">

            <button class="donate-btn" onclick="tg.openLink('https://yoomoney.ru/to/4100117500602780')">
                ☕ На кофе
            </button>

            <div class="genre-tabs">
                <button id="tab-all" class="genre-tab active" onclick="switchGenreTab(null)">Все</button>
                <button id="tab-bara" class="genre-tab" onclick="switchGenreTab('bara')">Bara</button>
                <button id="tab-furry" class="genre-tab" onclick="switchGenreTab('furry')">Furry</button>
            </div>

            <div class="filter-panel">
                <div class="filter-row">
                    <select id="authorSelect" class="author-select" onchange="filterByAuthor(this.value)">
                        <option value="">Все авторы</option>
                    </select>
                    <button id="resetBtn" class="reset-btn" onclick="resetFilters()">Сбросить</button>
                </div>
                <div id="activeFilterText" class="active-filter-info"></div>
            </div>

            <div class="catalog-grid" id="catalog"></div>
        </div>
    </div>

    <div id="readerScreen" class="screen reader-screen">
        <div id="readerTrack" class="reader-track"></div>
    </div>

    <!-- ВЕРСТКА ДЛЯ КОНТЕКСТНОГО МЕНЮ -->
    <div id="contextOverlay" class="context-overlay" onclick="closeContextMenu()">
        <div id="contextMenu" class="context-menu" onclick="event.stopPropagation()">
            <div id="contextTitle" class="context-menu-title">Название тайтла</div>
            <button id="contextToggleBtn" class="context-menu-btn action-toggle" onclick="handleStatusToggle()">
                <!-- Текст подставится скриптом -->
            </button>
            <button class="context-menu-btn btn-close" onclick="closeContextMenu()">Отмена</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        let allManga = []; 
        let selectedTag = null;
        let selectedAuthor = "";
        let selectedGenreTab = null;

        let currentMangaId = null;
        let currentPagesCount = 0;
        let currentPageIndex = 0;
        let isMangaFinishedAlertShown = false;

        let scale = 1;
        let totalTranslateX = 0;
        let totalTranslateY = 0;
        let isZooming = false;

        let uiTimeout = null;
        let lastTapTime = 0; 
        let tapTimeout = null; 

        // Переменная для хранения ID тайтла, на который долго нажали
        let contextActiveMangaId = null; 

        let readMangaList = JSON.parse(localStorage.getItem('manga_read_list')) || [];

        fetch('database.json?v=' + new Date().getTime())
            .then(response => response.json())
            .then(data => {
                allManga = data;
                buildAuthorSelect(); 
                renderCatalog();     

                if (tg.initDataUnsafe && tg.initDataUnsafe.start_param) {
                    const startId = tg.initDataUnsafe.start_param;
                    const hasManga = allManga.some(m => m.id === startId);
                    if (hasManga) {
                        openReader(startId);
                    }
                }
            })
            .catch(err => console.error("Ошибка загрузки базы данных", err));

        function buildAuthorSelect() {
            const select = document.getElementById('authorSelect');
            const authorsSet = new Set();
            allManga.forEach(manga => {
                if (manga.author) {
                    const splitAuthors = manga.author.split(/[,/]| и /);
                    splitAuthors.forEach(author => { const trimmed = author.trim(); if (trimmed) authorsSet.add(trimmed); });
                }
            });
            authorsSet.forEach(author => {
                const opt = document.createElement('option'); opt.value = author; opt.textContent = author; select.appendChild(opt);
            });
        }

        function switchGenreTab(genre) {
            selectedGenreTab = genre;
            document.querySelectorAll('.genre-tab').forEach(tab => tab.classList.remove('active'));
            if (genre === null) document.getElementById('tab-all').classList.add('active');
            else if (genre === 'bara') document.getElementById('tab-bara').classList.add('active');
            else if (genre === 'furry') document.getElementById('tab-furry').classList.add('active');
            renderCatalog();
        }

        function renderCatalog() {
            const catalog = document.getElementById('catalog');
            catalog.innerHTML = ""; 

            const filtered = allManga.filter(manga => {
                const matchTag = !selectedTag || manga.tags.includes(selectedTag);
                const matchAuthor = !selectedAuthor || (manga.author && manga.author.includes(selectedAuthor));
                let matchGenreTab = true;
                if (selectedGenreTab) {
                    matchGenreTab = manga.tags.some(t => t.toLowerCase() === selectedGenreTab);
                }
                return matchTag && matchAuthor && matchGenreTab;
            });

            filtered.forEach(manga => {
                const card = document.createElement('div');
                let genreClass = '';
                if (manga.tags.some(t => t.toLowerCase() === 'bara')) genreClass = 'genre-bara';
                else if (manga.tags.some(t => t.toLowerCase() === 'furry')) genreClass = 'genre-furry';
                
                card.className = `manga-card ${genreClass}`;
                
                // Навешиваем систему определения Long Press (долгого нажатия)
                setupLongPress(card, manga.id);

                const visibleTags = manga.tags.filter(t => t.toLowerCase() !== 'bara' && t.toLowerCase() !== 'furry');
                const tagsHtml = visibleTags.map(t => `<span class="tag ${t === selectedTag ? 'selected' : ''}" onclick="event.stopPropagation(); filterByTag('${t}')">${t}</span>`).join('');

                const splitAuthors = manga.author ? manga.author.split(/[,/]| и /) : [];
                const authorsHtml = splitAuthors.map(author => {
                    const name = author.trim(); if (!name) return '';
                    const isSelected = name === selectedAuthor ? 'selected' : '';
                    return `<span class="tag-author ${isSelected}" onclick="event.stopPropagation(); filterByAuthorTag('${name}')">${name}</span>`;
                }).join(' ');

                let statusBadge = '';
                if (readMangaList.includes(manga.id)) {
                    statusBadge = `<div class="card-status-badge">✅ Прочитано</div>`;
                }

                card.innerHTML = `
                    ${statusBadge}
                    <div class="card-cover-wrap"><img src="${manga.cover}" class="card-cover" loading="lazy"></div>
                    <div class="card-info">
                        <div><h3 class="card-title">${manga.title}</h3></div>
                        <div class="meta-container">
                            <div class="card-tags">${authorsHtml}</div>
                            <div class="card-tags">${tagsHtml}</div>
                        </div>
                    </div>
                `;
                catalog.appendChild(card);
            });
            updateResetButtonVisibility();
        }

        // РЕАЛИЗАЦИЯ ДЕТЕКТОРА ДОЛГОГО НАЖАТИЯ (LONG PRESS)
        function setupLongPress(element, mangaId) {
            let pressTimer = null;
            let isLongPress = false;

            const startPress = (e) => {
                isLongPress = false;
                // Запускаем таймер на 600мс удержания
                pressTimer = setTimeout(() => {
                    isLongPress = true;
                    if (tg.HapticFeedback) {
                        tg.HapticFeedback.impactOccurred('medium'); // Виброотклик Telegram
                    }
                    openContextMenu(mangaId);
                }, 600);
            };

            const endPress = (e) => {
                clearTimeout(pressTimer);
                // Если это был короткий клик, а не удержание — открываем читалку
                if (!isLongPress && e.type !== 'mouseleave') {
                    // Проверяем, что кликнули не по тегам
                    if (!e.target.classList.contains('tag') && !e.target.classList.contains('tag-author')) {
                        openReader(mangaId);
                    }
                }
            };

            // События для сенсорных экранов
            element.addEventListener('touchstart', startPress, { passive: true });
            element.addEventListener('touchend', endPress);
            
            // События для мыши (ПК-версия)
            element.addEventListener('mousedown', startPress);
            element.addEventListener('mouseup', endPress);
            element.addEventListener('mouseleave', () => clearTimeout(pressTimer));
        }

        // УПРАВЛЕНИЕ КОНТЕКСТНЫМ МЕНЮ
        function openContextMenu(mangaId) {
            const manga = allManga.find(m => m.id === mangaId);
            if (!manga) return;

            contextActiveMangaId = mangaId;
            
            document.getElementById('contextTitle').textContent = manga.title;
            const toggleBtn = document.getElementById('contextToggleBtn');

            // Проверяем статус и меняем текст/иконку кнопки действия
            if (readMangaList.includes(mangaId)) {
                toggleBtn.innerHTML = "❌ Убрать из прочитанного";
            } else {
                toggleBtn.innerHTML = "✅ Отметить прочитанным";
            }

            document.getElementById('contextOverlay').classList.add('active');
            document.getElementById('contextMenu').classList.add('active');
        }

        function closeContextMenu() {
            document.getElementById('contextOverlay').classList.remove('active');
            document.getElementById('contextMenu').classList.remove('active');
            contextActiveMangaId = null;
        }

        // ОБРАБОТЧИК СМЕНЫ СТАТУСА ИЗ МЕНЮ
        function handleStatusToggle() {
            if (!contextActiveMangaId) return;

            const index = readMangaList.indexOf(contextActiveMangaId);
            if (index > -1) {
                // Если уже был прочитан — удаляем из массива
                readMangaList.splice(index, 1);
            } else {
                // Если не был прочитан — добавляем
                readMangaList.push(contextActiveMangaId);
            }

            // Сохраняем изменения в локальную память
            localStorage.setItem('manga_read_list', JSON.stringify(readMangaList));
            
            closeContextMenu();
            renderCatalog(); // Перерисовываем каталог, чтобы обновились галочки
        }

        function filterByAuthorTag(authorName) {
            selectedAuthor = selectedAuthor === authorName ? "" : authorName;
            document.getElementById('authorSelect').value = selectedAuthor;
            renderCatalog();
        }

        function resetUiTimer() {
            if (scale > 1) {
                hideUi();
                return;
            }
            showUi();
            clearTimeout(uiTimeout);
            uiTimeout = setTimeout(() => {
                hideUi();
            }, 2000);
        }

        function handleZoneTap(zoneType, event) {
            if (event) event.stopPropagation();

            const currentTime = new Date().getTime();
            const tapLength = currentTime - lastTapTime;

            if (tapLength < 250 && tapLength > 0) {
                clearTimeout(tapTimeout); 
                handleDoubleTap(event);
                lastTapTime = 0;
                return;
            }
            lastTapTime = currentTime;

            tapTimeout = setTimeout(() => {
                if (scale > 1) return; 

                if (zoneType === 'left') {
                    changePage(-1, event);
                } else if (zoneType === 'right') {
                    changePage(1, event);
                } else if (zoneType === 'center') {
                    const header = document.getElementById('readerHeader');
                    if (header.classList.contains('visible')) {
                        clearTimeout(uiTimeout);
                        hideUi();
                    } else {
                        resetUiTimer();
                    }
                }
            }, 250);
        }

        function handleDoubleTap(event) {
            const container = document.getElementById(`zoom-${currentPageIndex}`);
            if (!container) return;

            if (scale > 1) {
                scale = 1; totalTranslateX = 0; totalTranslateY = 0;
                container.style.transition = 'transform 0.25s cubic-bezier(0.25, 1, 0.5, 1)';
                container.style.transform = 'translate3d(0px, 0px, 0px) scale(1)';
                resetUiTimer(); 
            } else {
                scale = 2.5;

                let clickX = event.clientX;
                let clickY = event.clientY;

                if (event.touches && event.touches.length > 0) {
                    clickX = event.touches[0].clientX;
                    clickY = event.touches[0].clientY;
                } else if (event.changedTouches && event.changedTouches.length > 0) {
                    clickX = event.changedTouches[0].clientX;
                    clickY = event.changedTouches[0].clientY;
                }

                const originX = clickX - window.innerWidth / 2;
                const originY = clickY - window.innerHeight / 2;

                totalTranslateX = -originX * (scale - 1);
                totalTranslateY = -originY * (scale - 1);

                const maxDeltaX = (window.innerWidth * (scale - 1)) / 2;
                const maxDeltaY = (window.innerHeight * (scale - 1)) / 2;

                if (totalTranslateX > maxDeltaX) totalTranslateX = maxDeltaX;
                if (totalTranslateX < -maxDeltaX) totalTranslateX = -maxDeltaX;
                if (totalTranslateY > maxDeltaY) totalTranslateY = maxDeltaY;
                if (totalTranslateY < -maxDeltaY) totalTranslateY = -maxDeltaY;

                container.style.transition = 'transform 0.25s cubic-bezier(0.25, 1, 0.5, 1)';
                container.style.transform = `translate3d(${totalTranslateX}px, ${totalTranslateY}px, 0px) scale(${scale})`;
                
                hideUi(); 
            }
        }

        function showUi() {
            if (scale > 1) return;
            document.getElementById('readerHeader').classList.add('visible');
        }

        function hideUi() {
            if (!isZooming) {
                document.getElementById('readerHeader').classList.remove('visible');
            }
        }

        function filterByTag(tag) { selectedTag = selectedTag === tag ? null : tag; renderCatalog(); }
        function filterByAuthor(author) { selectedAuthor = author; renderCatalog(); }
        
        function resetFilters() { 
            selectedTag = null; selectedAuthor = ""; selectedGenreTab = null;
            document.getElementById('authorSelect').value = ""; 
            document.querySelectorAll('.genre-tab').forEach(tab => tab.classList.remove('active'));
            document.getElementById('tab-all').classList.add('active');
            renderCatalog();
        }

        function updateResetButtonVisibility() {
            const resetBtn = document.getElementById('resetBtn');
            const infoText = document.getElementById('activeFilterText');
            if (selectedTag || selectedAuthor || selectedGenreTab) {
                resetBtn.style.display = "block";
                let text = "Фильтр: ";
                if (selectedGenreTab) text += `[Жанр: ${selectedGenreTab.toUpperCase()}] `;
                if (selectedAuthor) text += `[${selectedAuthor}] `;
                if (selectedTag) text += `[#${selectedTag}] `;
                infoText.textContent = text;
            } else { resetBtn.style.display = "none"; infoText.textContent = ""; }
        }

        function openReader(mangaId) {
            const manga = allManga.find(m => m.id === mangaId);
            if (!manga || !manga.pages || manga.pages.length === 0) return;

            currentMangaId = mangaId;
            currentPagesCount = manga.pages.length;
            currentPageIndex = 0;
            isMangaFinishedAlertShown = false;
            resetZoom();

            manga.pages.forEach(url => { const imgCache = new Image(); imgCache.src = url; });

            const track = document.getElementById('readerTrack');
            track.innerHTML = ""; 

            manga.pages.forEach((pageUrl, index) => {
                const slide = document.createElement('div');
                slide.className = 'reader-slide';
                slide.innerHTML = `
                    <div class="tap-zone-left" onclick="handleZoneTap('left', event)"></div>
                    <div class="tap-zone-center" onclick="handleZoneTap('center', event)"></div>
                    <div class="tap-zone-right" onclick="handleZoneTap('right', event)"></div>
                    <div class="zoom-container" id="zoom-${index}">
                        <img class="reader-img" src="${pageUrl}">
                    </div>
                `;
                track.appendChild(slide);
            });

            document.getElementById('mainScreen').classList.remove('active');
            document.getElementById('readerScreen').classList.add('active');
            
            if (document.activeElement) document.activeElement.blur();

            updateTrackPosition();
            initTouchZoomAndSwipe();
            resetUiTimer();
        }

        function updateTrackPosition() {
            const track = document.getElementById('readerTrack');
            track.style.transform = `translate3d(-${currentPageIndex * 100}vw, 0px, 0px)`;
            document.getElementById('pageCounter').textContent = `${currentPageIndex + 1} / ${currentPagesCount}`;
        }

        function changePage(direction, event) {
            if (scale > 1) return; 
            
            const isUiVisible = document.getElementById('readerHeader').classList.contains('visible');
            if (isUiVisible && event && event.clientY < 65) {
                return; 
            }

            resetUiTimer();

            const targetIndex = currentPageIndex + direction;
            if (targetIndex >= 0 && targetIndex < currentPagesCount) {
                currentPageIndex = targetIndex;
                resetZoom();
                updateTrackPosition();
            } else if (targetIndex >= currentPagesCount && !isMangaFinishedAlertShown) {
                isMangaFinishedAlertShown = true;
                if (!readMangaList.includes(currentMangaId)) {
                    readMangaList.push(currentMangaId);
                    localStorage.setItem('manga_read_list', JSON.stringify(readMangaList));
                }
                
                if (window.Telegram && tg.showAlert && tg.initDataUnsafe && Object.keys(tg.initDataUnsafe).length > 0) {
                    tg.showAlert("Вы прочитали эту главу! 🎉", () => { closeReader(); });
                } else {
                    alert("Вы прочитали эту главу! 🎉");
                    closeReader();
                }
            }
        }

        window.addEventListener('keydown', (e) => {
            const readerScreen = document.getElementById('readerScreen');
            if (!readerScreen || !readerScreen.classList.contains('active')) return;

            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'ф') {
                e.preventDefault(); 
                changePage(-1);
            } else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'в') {
                e.preventDefault(); 
                changePage(1);
            } else if (e.key === 'Escape') {
                e.preventDefault();
                closeReader();
            }
        }, true);

        function initTouchZoomAndSwipe() {
            const screen = document.getElementById('readerScreen');
            
            let startDist = 0;
            let startScale = 1;
            let startTouchX = 0;
            let startTouchY = 0;
            let currentCenterFallbackX = 0;
            let currentCenterFallbackY = 0;

            let swipeStartX = 0;
            let swipeStartY = 0;
            let isSwipeCandidate = false;

            screen.addEventListener('touchstart', (e) => {
                if (scale === 1) resetUiTimer();
                
                if (e.touches.length === 2) {
                    isZooming = true;
                    isSwipeCandidate = false; 
                    startDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                    startScale = scale;

                    const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                    const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;

                    startTouchX = midX;
                    startTouchY = midY;
                    currentCenterFallbackX = totalTranslateX;
                    currentCenterFallbackY = totalTranslateY;

                } else if (e.touches.length === 1) {
                    isZooming = false;
                    startTouchX = e.touches[0].clientX;
                    startTouchY = e.touches[0].clientY;
                    currentCenterFallbackX = totalTranslateX;
                    currentCenterFallbackY = totalTranslateY;

                    if (scale === 1) {
                        swipeStartX = e.touches[0].clientX;
                        swipeStartY = e.touches[0].clientY;
                        isSwipeCandidate = true;
                    } else {
                        isSwipeCandidate = false;
                    }
                }
            }, { passive: true });

            screen.addEventListener('touchmove', (e) => {
                const container = document.getElementById(`zoom-${currentPageIndex}`);
                if (!container) return;

                if (e.touches.length === 2 && isZooming) {
                    const currentDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                    let targetScale = startScale * (currentDist / startDist);

                    if (targetScale < 1) targetScale = 1;
                    if (targetScale > 4) targetScale = 4;

                    const currentMidX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                    const currentMidY = (e.touches[0].clientY + e.touches[1].clientY) / 2;

                    if (targetScale > 1) {
                        const originX = startTouchX - window.innerWidth / 2;
                        const originY = startTouchY - window.innerHeight / 2;

                        totalTranslateX = currentMidX - startTouchX + currentCenterFallbackX + (originX - currentCenterFallbackX) * (1 - targetScale / startScale);
                        totalTranslateY = currentMidY - startTouchY + currentCenterFallbackY + (originY - currentCenterFallbackY) * (1 - targetScale / startScale);
                    } else {
                        totalTranslateX = 0;
                        totalTranslateY = 0;
                    }

                    scale = targetScale;
                    container.style.transition = 'none';
                    container.style.transform = `translate3d(${totalTranslateX}px, ${totalTranslateY}px, 0px) scale(${scale})`;

                    if (scale > 1) hideUi(); 

                } else if (e.touches.length === 1) {
                    if (scale > 1 && !isZooming) {
                        const deltaX = e.touches[0].clientX - startTouchX;
                        const deltaY = e.touches[0].clientY - startTouchY;

                        let nextTranslateX = currentCenterFallbackX + deltaX;
                        let nextTranslateY = currentCenterFallbackY + deltaY;

                        const maxDeltaX = (window.innerWidth * (scale - 1)) / 2;
                        const maxDeltaY = (window.innerHeight * (scale - 1)) / 2;

                        if (nextTranslateX > maxDeltaX) nextTranslateX = maxDeltaX;
                        if (nextTranslateX < -maxDeltaX) nextTranslateX = -maxDeltaX;
                        if (nextTranslateY > maxDeltaY) nextTranslateY = maxDeltaY;
                        if (nextTranslateY < -maxDeltaY) nextTranslateY = -maxDeltaY;

                        totalTranslateX = nextTranslateX;
                        totalTranslateY = nextTranslateY;

                        container.style.transition = 'none';
                        container.style.transform = `translate3d(${totalTranslateX}px, ${totalTranslateY}px, 0px) scale(${scale})`;
                    }
                }
            }, { passive: true });

            screen.addEventListener('touchend', (e) => {
                const container = document.getElementById(`zoom-${currentPageIndex}`);
                if (!container) return;

                if (isSwipeCandidate && scale === 1 && e.changedTouches.length > 0) {
                    const swipeEndX = e.changedTouches[0].clientX;
                    const swipeEndY = e.changedTouches[0].clientY;
                    
                    const diffX = swipeEndX - swipeStartX;
                    const diffY = swipeEndY - swipeStartY;

                    if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 50) {
                        if (diffX > 0) {
                            changePage(-1);
                        } else {
                            changePage(1);
                        }
                        isSwipeCandidate = false;
                        return;
                    }
                }

                if (scale <= 1.05) {
                    scale = 1; totalTranslateX = 0; totalTranslateY = 0; isZooming = false;
                    container.style.transition = 'transform 0.2s cubic-bezier(0.25, 1, 0.5, 1)';
                    container.style.transform = 'translate3d(0px, 0px, 0px) scale(1)';
                    resetUiTimer();
                } else if (e.touches.length === 1) {
                    startTouchX = e.touches[0].clientX;
                    startTouchY = e.touches[0].clientY;
                    currentCenterFallbackX = totalTranslateX;
                    currentCenterFallbackY = totalTranslateY;
                    isZooming = false;
                    hideUi();
                }
                
                isSwipeCandidate = false;
            }, { passive: true });
        }

        function resetZoom() {
            scale = 1; totalTranslateX = 0; totalTranslateY = 0; isZooming = false;
            document.querySelectorAll('.zoom-container').forEach(c => { 
                c.style.transition = 'none';
                c.style.transform = 'translate3d(0px, 0px, 0px) scale(1)'; 
            });
        }

        function closeReader(event) {
            if(event) event.stopPropagation();
            clearTimeout(uiTimeout);
            clearTimeout(tapTimeout);
            
            document.getElementById('readerScreen').classList.remove('active');
            document.getElementById('readerHeader').classList.remove('visible');
            document.getElementById('mainScreen').classList.add('active');
            
            setTimeout(() => {
                document.getElementById('readerTrack').innerHTML = "";
                resetZoom();
                renderCatalog();
            }, 350);
            window.scrollTo(0, 0);
        }
    </script>
