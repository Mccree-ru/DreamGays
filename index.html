<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        /* Базовые стили для структуры приложения */
        body { font-family: sans-serif; background: #141414; color: #fff; margin: 0; padding: 0; }
        .screen { display: none; padding: 15px; }
        .screen.active { display: block; }
        
        /* Каталог */
        .catalog-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 15px; }
        .manga-card { background: #202020; border-radius: 8px; padding: 10px; cursor: pointer; }
        .manga-card img { width: 100%; border-radius: 6px; object-fit: cover; aspect-ratio: 3/4; }
        
        /* Превью тайтла */
        .preview-header { display: flex; gap: 15px; }
        .preview-cover { width: 120px; border-radius: 6px; }
        .btn { background: #00eb87; color: #000; border: none; padding: 10px 20px; font-weight: bold; border-radius: 6px; cursor: pointer; width: 100%; margin-top: 10px; }
        .btn-like { background: #333; color: #fff; }
        .btn-like.liked { background: #ff3b30; }
        
        /* Комментарии */
        .comments-section { margin-top: 25px; border-top: 1px solid #333; padding-top: 15px; }
        .comment-item { background: #1c1c1c; padding: 10px; border-radius: 6px; margin-bottom: 10px; }
        .comment-user { font-weight: bold; color: #00eb87; font-size: 14px; }
        .comment-text { margin: 5px 0 0 0; font-size: 14px; }
        .comment-input-block { display: flex; gap: 10px; margin-top: 15px; }
        .comment-input { flex: 1; background: #252525; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 6px; }

        /* Читалка (на весь экран) */
        #readerScreen { padding: 0; background: #000; position: fixed; top:0; left:0; width:100vw; height:100vh; z-index: 999; }
        .reader-container { width: 100%; height: 100%; overflow-y: auto; display: flex; flex-direction: column; }
        .reader-page { width: 100%; display: block; height: auto; }
        .reader-close { position: fixed; top: 15px; right: 15px; background: rgba(0,0,0,0.7); color: #fff; border: none; padding: 10px; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <!-- ЭКРАН 1: КАТАЛОГ МАНГИ -->
    <div id="catalogScreen" class="screen active">
        <h2>Каталог Manhua</h2>
        <div class="sorting-block">
            <!-- Сортировка всегда автоматическая по ТЗ (Популярные выше) -->
            <span>🔥 Сортировка: Сначала популярные</span>
        </div>
        <div id="catalogGrid" class="catalog-grid">Загрузка тайтлов...</div>
    </div>

    <!-- ЭКРАН 2: ПРЕВЬЮ ТАЙТЛА (ОПИСАНИЕ, ЛАЙКИ, КОММЕНТАРИИ) -->
    <div id="previewScreen" class="screen">
        <button class="btn btn-like" onclick="app.showScreen('catalogScreen')">← Назад в каталог</button>
        <div class="preview-header" style="margin-top:15px;">
            <img id="previewCover" class="preview-cover" src="" alt="">
            <div>
                <h3 id="previewTitle" style="margin:0 0 5px 0;"></h3>
                <p id="previewAuthor" style="color:#aaa; margin:0;"></p>
                <p id="previewLikesCount" style="margin:10px 0 0 0; font-weight:bold;"></p>
            </div>
        </div>
        
        <button id="startReadBtn" class="btn">Читать мангу</button>
        <button id="likeBtn" class="btn btn-like">🤍 Лайкнуть</button>

        <div class="comments-section">
            <h4>Комментарии пользователей</h4>
            <div id="commentsList">Загрузка комментариев...</div>
            
            <div class="comment-input-block">
                <input type="text" id="commentInputField" class="comment-input" placeholder="Напишите комментарий...">
                <button class="btn" style="width:auto; margin:0;" onclick="app.sendComment()">Отправить</button>
            </div>
        </div>
    </div>

    <!-- ЭКРАН 3: ЧИТАЛКА (ФУЛЛСКРИН С СУПЕР-СКРОЛЛОМ И ЗУМОМ) -->
    <div id="readerScreen" class="screen">
        <button class="reader-close" onclick="app.closeMangaReader()">✕</button>
        <div id="readerContainer" class="reader-container"></div>
    </div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="api.js"></script>
<script src="reader.js"></script>
<script src="app.js"></script>
    
</body>
</html>
