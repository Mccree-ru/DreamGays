<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>McCree Ru Manga</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* НАСТРОЙКА ЦВЕТОВ ПОД ТЕМУ TELEGRAM */
        :root {
            --bg-color: var(--tg-theme-bg-color, #ffffff);
            --text-color: var(--tg-theme-text-color, #222222);
            --hint-color: var(--tg-theme-hint-color, #888888);
            --link-color: var(--tg-theme-link-color, #248bcf);
            --card-bg: var(--tg-theme-secondary-bg-color, #f1f1f1);
            --button-color: var(--tg-theme-button-color, #248bcf);
            --button-text: var(--tg-theme-button-text-color, #ffffff);
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            margin: 0; 
            padding: 0;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* КОНТЕЙНЕР ГЛАВНОГО ЭКРАНА (КАТАЛОГ) */
        .main-container {
            padding: 15px;
        }
        
        h1.main-title { 
            font-size: 20px; 
            text-align: center; 
            margin-top: 5px;
            margin-bottom: 15px; 
        }

        /* Кнопка Доната */
        .donate-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: linear-gradient(135deg, #8b3ffd, #5411ff);
            color: #ffffff;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
            box-shadow: 0 4px 12px rgba(139, 63, 253, 0.3);
            transition: transform 0.1s;
        }
        .donate-btn:active { transform: scale(0.98); }
        
        /* Панель фильтров */
        .filter-panel {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .filter-row {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        select.author-select {
            background-color: var(--card-bg);
            color: var(--text-color);
            border: 1px solid var(--hint-color);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            flex-grow: 1;
            -webkit-appearance: none;
        }

        .reset-btn {
            background-color: var(--button-color);
            color: var(--button-text);
            border: none;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            display: none;
        }

        .active-filter-info {
            font-size: 13px;
            color: var(--link-color);
            font-weight: bold;
        }

        /* Сетка каталога */
        .catalog-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 15px; 
        }
        
        /* Карточка манги */
        .manga-card { 
            background-color: var(--card-bg); 
            border-radius: 12px; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            cursor: pointer; 
            transition: transform 0.1s; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .manga-card:active { transform: scale(0.97); }
        .card-cover-wrap { width: 100%; padding-top: 140%; position: relative; background-color: #222; }
        .card-cover { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        
        .card-info { padding: 10px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .card-title { font-size: 14px; font-weight: 600; margin: 0 0 5px 0; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.3; }
        .card-author { font-size: 12px; color: var(--hint-color); margin-bottom: 8px; }
        
        /* Теги */
        .card-tags { display: flex; flex-wrap: wrap; gap: 4px; }
        .tag { 
            font-size: 10px; 
            background-color: rgba(36, 139, 207, 0.13); 
            color: var(--link-color); 
            padding: 3px 7px; 
            border-radius: 5px; 
            font-weight: bold; 
            text-transform: uppercase; 
        }
        .tag.selected {
            background-color: var(--link-color);
            color: #fff;
        }

        /* ========================================== */
        /* ЭКРАН ПОСТРАНИЧНОЙ ЧИТАЛКИ */
        /* ========================================== */
        .reader-screen {
            display: none;
            background-color: #111111; /* Темный фон читалки */
            height: 100vh;
            width: 100vw;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 10;
            user-select: none;
            -webkit-user-select: none;
        }

        /* Плавающая кнопка назад */
        .back-button {
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 100;
            background-color: rgba(0, 0, 0, 0.65);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.25);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            backdrop-filter: blur(4px);
        }

        /* Индикатор страниц (например, 5 / 24) */
        .page-counter {
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 100;
            background-color: rgba(0, 0, 0, 0.65);
            color: #ffffff;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            backdrop-filter: blur(4px);
        }

        /* Зона отображения текущей картинки */
        .reader-view {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .reader-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; /* Картинка полностью вписывается в экран телефона */
        }

        /* Невидимые кликабельные зоны поверх картинки */
        .zone-left {
            position: absolute;
            top: 0;
            left: 0;
            width: 35%; /* Левые 35% экрана — назад */
            height: 100%;
            z-index: 20;
            cursor: west-resize;
        }

        .zone-right {
            position: absolute;
            top: 0;
            right: 0;
            width: 65%; /* Правые 65% экрана — вперед */
            height: 100%;
            z-index: 20;
            cursor: east-resize;
        }
    </style>
</head>
<body>

    <!-- КНОПКА НАЗАД ДЛЯ ЧИТАЛКИ -->
    <button id="backBtn" style="display:none;" class="back-button" onclick="closeReader()">⬅ В каталог</button>
    <!-- ИНДИКАТОР СТРАНИЦ -->
    <div id="pageCounter" style="display:none;" class="page-counter">0 / 0</div>

    <!-- ГЛАВНЫЙ ЭКРАН -->
    <div id="mainScreen" class="main-container">
        <h1 class="main-title">Каталог переводов</h1>

        <!-- Кнопка Доната -->
        <button class="donate-btn" onclick="tg.openLink('https://yoomoney.ru/to/4100117500602780')">
            ☕ Поддержать переводы (Донат)
        </button>

        <div class="filter-panel">
            <div class="filter-row">
                <select id="authorSelect" class="author-select" onchange="filterByAuthor(this.value)">
                    <option value="">Все авторы</option>
                </select>
                <button id="resetBtn" class="reset-btn" onclick="resetFilters()">Сбросить</button>
            </div>
            <div id="activeFilterText" class="active-filter-info"></div>
        </div>

        <div class="catalog-grid" id="catalog">
            <!-- Сюда скрипт выведет карточки -->
        </div>
    </div>

    <!-- ЭКРАН ЧИТАЛКИ -->
    <div id="readerScreen" class="reader-screen">
        <div class="reader-view">
            <!-- Кликабельные зоны -->
            <div class="zone-left" onclick="prevPage()"></div>
            <div class="zone-right" onclick="nextPage()"></div>
            
            <!-- Сама страница манги -->
            <img id="mangaImage" class="reader-img" src="" alt="Страница манги">
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        let allManga = []; 
        let selectedTag = null;
        let selectedAuthor = "";

        // Переменные для контроля текущего чтения
        let currentMangaPages = [];
        let currentPageIndex = 0;

        // Загружаем данные из database.json с Cache Busting (обходом кэша)
        fetch('database.json?v=' + new Date().getTime())
            .then(response => response.json())
            .then(data => {
                allManga = data;
                buildAuthorSelect(); 
                renderCatalog();     
            })
            .catch(err => console.error("Ошибка загрузки базы данных", err));

        function buildAuthorSelect() {
            const select = document.getElementById('authorSelect');
            const authorsSet = new Set();
            allManga.forEach(manga => {
                if (manga.author) {
                    const splitAuthors = manga.author.split(/[,/]| и /);
                    splitAuthors.forEach(author => {
                        const trimmed = author.trim();
                        if (trimmed) authorsSet.add(trimmed);
                    });
                }
            });
            authorsSet.forEach(author => {
                const opt = document.createElement('option');
                opt.value = author;
                opt.textContent = author;
                select.appendChild(opt);
            });
        }

        function renderCatalog() {
            const catalog = document.getElementById('catalog');
            catalog.innerHTML = ""; 

            const filtered = allManga.filter(manga => {
                const matchTag = !selectedTag || manga.tags.includes(selectedTag);
                const matchAuthor = !selectedAuthor || (manga.author && manga.author.includes(selectedAuthor));
                return matchTag && matchAuthor;
            });

            filtered.forEach(manga => {
                const card = document.createElement('div');
                card.className = 'manga-card';
                card.onclick = (e) => {
                    if (e.target.classList.contains('tag')) return;
                    openReader(manga.id);
                };

                const tagsHtml = manga.tags.map(t => {
                    const isSelected = t === selectedTag ? 'selected' : '';
                    return `<span class="tag ${isSelected}" onclick="filterByTag('${t}')">${t}</span>`;
                }).join('');

                card.innerHTML = `
                    <div class="card-cover-wrap">
                        <img src="${manga.cover}" class="card-cover" loading="lazy">
                    </div>
                    <div class="card-info">
                        <div>
                            <h3 class="card-title">${manga.title}</h3>
                            <div class="card-author">Автор: ${manga.author}</div>
                        </div>
                        <div class="card-tags">${tagsHtml}</div>
                    </div>
                `;
                catalog.appendChild(card);
            });
            updateResetButtonVisibility();
        }

        function filterByTag(tag) {
            selectedTag = selectedTag === tag ? null : tag;
            renderCatalog();
        }

        function filterByAuthor(author) {
            selectedAuthor = author;
            renderCatalog();
        }

        function resetFilters() {
            selectedTag = null;
            selectedAuthor = "";
            document.getElementById('authorSelect').value = "";
            renderCatalog();
        }

        function updateResetButtonVisibility() {
            const resetBtn = document.getElementById('resetBtn');
            const infoText = document.getElementById('activeFilterText');
            if (selectedTag || selectedAuthor) {
                resetBtn.style.display = "block";
                let text = "Фильтр: ";
                if (selectedAuthor) text += `[${selectedAuthor}] `;
                if (selectedTag) text += `[#${selectedTag}]`;
                infoText.textContent = text;
            } else {
                resetBtn.style.display = "none";
                infoText.textContent = "";
            }
        }

        /* ========================================== */
        /* УЛУЧШЕННАЯ ПОСТРАНИЧНАЯ ЧИТАЛКА */
        /* ========================================== */
        
        function openReader(mangaId) {
            const manga = allManga.find(m => m.id === mangaId);
            if (!manga || !manga.pages || manga.pages.length === 0) {
                alert("У этой манги нет сохраненных страниц!");
                return;
            }

            // Загружаем страницы проекта в память читалки
            currentMangaPages = manga.pages;
            currentPageIndex = 0;

            // Переключаем экраны
            document.getElementById('mainScreen').style.display = 'none';
            document.getElementById('readerScreen').style.display = 'block';
            document.getElementById('backBtn').style.display = 'block';
            document.getElementById('pageCounter').style.display = 'block';

            // Показываем самую первую страницу
            updateReaderPage();
        }

        // Обновление картинки и счетчика страниц
        function updateReaderPage() {
            const imgElement = document.getElementById('mangaImage');
            const counterElement = document.getElementById('pageCounter');

            // Устанавливаем ссылку на текущую картинку
            imgElement.src = currentMangaPages[currentPageIndex];
            
            // Обновляем текст счетчика (человеческий формат с 1, а не с 0)
            counterElement.textContent = `${currentPageIndex + 1} / ${currentMangaPages.length}`;
        }

        // Клик по правой зоне — следующая страница
        function nextPage() {
            if (currentPageIndex < currentMangaPages.length - 1) {
                currentPageIndex++;
                updateReaderPage();
            } else {
                // Если страницы кончились, выдаем красивый алерт Telegram и выходим в каталог
                tg.showAlert("Вы прочитали эту главу! 🎉", () => {
                    closeReader();
                });
            }
        }

        // Клик по левой зоне — предыдущая страница
        function prevPage() {
            if (currentPageIndex > 0) {
                currentPageIndex--;
                updateReaderPage();
            }
        }

        function closeReader() {
            // Закрываем читалку, возвращаем каталог
            document.getElementById('readerScreen').style.display = 'none';
            document.getElementById('backBtn').style.display = 'none';
            document.getElementById('pageCounter').style.display = 'none';
            document.getElementById('mainScreen').style.display = 'block';
            
            // Сбрасываем кэш страниц
            currentMangaPages = [];
            window.scrollTo(0, 0);
        }
    </script>
</body>
</html>
