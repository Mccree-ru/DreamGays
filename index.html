<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>McCree Ru Manga</title>
    <style>
        :root {
            --bg-color: var(--tg-theme-bg-color, #141414);
            --text-color: var(--tg-theme-text-color, #ffffff);
            --hint-color: var(--tg-theme-hint-color, #888888);
            --link-color: var(--tg-theme-link-color, #00eb87);
            --card-bg: var(--tg-theme-secondary-bg-color, #202020);
            --button-color: var(--tg-theme-button-color, #00eb87);
            --button-text: var(--tg-theme-button-text-color, #000000);
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            margin: 0; padding: 0;
            overflow: hidden;
        }

        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            overflow-y: auto; opacity: 0; pointer-events: none;
            transform: scale(0.98); transition: opacity 0.3s, transform 0.3s;
            box-sizing: border-box;
        }
        .screen.active { opacity: 1; pointer-events: auto; transform: scale(1); }

        .main-container { padding: 15px; max-width: 1400px; margin: 0 auto; box-sizing: border-box; }

        .donate-btn {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            background: linear-gradient(135deg, #ff9500, #ff5e00); color: #ffffff;
            border: none; width: 100%; padding: 12px; border-radius: 12px;
            font-size: 15px; font-weight: bold; cursor: pointer; margin-bottom: 15px;
        }
        .reader-donate-btn {
            background: linear-gradient(135deg, #ff9500, #ff5e00); color: #ffffff; border: none; 
            padding: 7px 12px; border-radius: 8px; font-size: 12px; font-weight: bold; cursor: pointer;
        }

        .genre-tabs { display: flex; gap: 8px; margin-bottom: 15px; }
        .genre-tab {
            flex: 1; padding: 10px; border: none; border-radius: 10px;
            background-color: var(--card-bg); color: var(--text-color);
            font-size: 13px; font-weight: bold; cursor: pointer; text-align: center;
        }
        .genre-tab.active { background-color: var(--button-color); color: var(--button-text); }
         
        .filter-panel { margin-bottom: 20px; display: flex; flex-direction: column; gap: 10px; }
        .filter-row { display: flex; align-items: center; gap: 10px; }
         
        select.author-select {
            background-color: var(--card-bg); color: var(--text-color); border: 1px solid var(--hint-color);
            padding: 8px 12px; border-radius: 8px; font-size: 14px; outline: none; flex-grow: 1;
        }
        .sort-btn {
            background-color: var(--card-bg); color: var(--text-color); border: 1px solid var(--hint-color);
            padding: 8px 12px; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer;
        }
        .sort-btn.active { border-color: var(--button-color); color: var(--button-color); }
        .reset-btn { background-color: #ff3b30; color: #fff; border: none; padding: 8px 14px; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; display: none; }

        /* Сетка каталога */
        .catalog-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .manga-card { background-color: var(--card-bg); border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; cursor: pointer; position: relative; }
        .card-cover-wrap { width: 100%; padding-top: 140%; position: relative; background-color: #222; }
        .card-cover { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .card-info { padding: 8px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .card-title { font-size: 13px; font-weight: 600; margin: 0 0 6px 0; line-height: 1.25; }
        
        .card-tags { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 4px; }
        .tag { font-size: 9px; background-color: rgba(0, 235, 135, 0.1); color: var(--link-color); padding: 2px 5px; border-radius: 5px; font-weight: bold; text-transform: uppercase; }
        .tag-author { font-size: 9px; background-color: #ff7b00; color: #ffffff; padding: 2px 5px; border-radius: 5px; font-weight: bold; }
        .tag-liked { font-size: 9px; background-color: #ff3b30; color: #ffffff; padding: 2px 5px; border-radius: 5px; font-weight: bold; }
        .card-stats { font-size: 11px; color: var(--hint-color); margin-top: 5px; font-weight: bold; }

        /* Превью */
        .preview-header { display: flex; gap: 15px; margin-top: 15px; }
        .preview-cover { width: 120px; border-radius: 6px; object-fit: cover; }
        .btn { background: var(--button-color); color: var(--button-text); border: none; padding: 12px; font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 10px; }
        .btn-like { background: #333; color: #fff; }
        .btn-like.liked { background: #ff3b30; }

        /* Общие стили блоков комментариев */
        .comments-section-title { font-size: 16px; font-weight: bold; margin: 25px 0 10px 0; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .comments-scroll { overflow-y: auto; max-height: 400px; padding: 5px 0; }
        .comment-item { background: #1c1c1c; padding: 10px; border-radius: 8px; margin-bottom: 8px; position: relative; }
        .comment-user { font-weight: bold; color: var(--button-color); font-size: 13px; }
        .comment-text { margin: 4px 0 0 0; font-size: 13px; color: #eee; }
        .comment-del-btn { position: absolute; top: 8px; right: 8px; background: none; border: none; color: #ff3b30; cursor: pointer; font-size: 11px; }
        .comment-input-block { display: flex; gap: 8px; margin-top: 10px; }
        .comment-input { flex: 1; background: #222; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 8px; font-size: 13px; }

        /* Читалка */
        .reader-screen { background-color: #000; overflow: hidden; touch-action: none; }
        .reader-header {
            position: fixed; top: 0; left: 0; width: 100%; height: 60px; z-index: 100;
            display: flex; align-items: center; justify-content: space-between;
            background-color: rgba(0, 0, 0, 0.8); backdrop-filter: blur(8px);
            padding: 0 12px; box-sizing: border-box; transition: opacity 0.2s;
        }
        .page-counter { color: #fff; font-size: 14px; font-weight: bold; }
        
        .reader-track { display: flex; height: 100%; width: 100%; transition: transform 0.25s ease-out; will-change: transform; }
        .reader-slide { flex: 0 0 100vw; width: 100vw; height: 100%; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        
        /* Контейнер для симуляции нативного зума */
        .zoom-container { 
            width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; 
            transition: transform 0.1s ease-out; transform-origin: center center;
        }
        .reader-img { width: 100%; height: 100%; object-fit: contain; pointer-events: none; }

        /* Постраничные комментарии (Bottom Sheet) */
        .page-comments-panel {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 60vh;
            background: rgba(20, 20, 20, 0.98); backdrop-filter: blur(15px);
            z-index: 150; border-top: 1px solid #333; box-sizing: border-box;
            transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.1, 0.9, 0.2, 1);
            display: flex; flex-direction: column;
        }
        .page-comments-panel.open { transform: translateY(0); }
        .comments-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; border-bottom: 1px solid #222; }
        
        /* Внутри шторки свой независимый контейнер */
        .page-comments-panel .comments-scroll { flex-grow: 1; max-height: none; padding: 15px; }
        .page-comments-panel .comment-input-block { padding: 10px 15px; background: #141414; border-top: 1px solid #222; margin: 0; }
    </style>
</head>
<body>

    <!-- ЭКРАН 1: ГЛАВНЫЙ КАТАЛОГ -->
    <div id="mainScreen" class="screen active">
        <div class="main-container">
            <button class="donate-btn" onclick="tg.openLink('https://yoomoney.ru/to/4100117500602780')">☕ На кофе</button>

            <div class="genre-tabs">
                <button id="tab-all" class="genre-tab active" onclick="app.switchGenreTab(null)">Все</button>
                <button id="tab-bara" class="genre-tab" onclick="app.switchGenreTab('bara')">Bara</button>
                <button id="tab-furry" class="genre-tab" onclick="app.switchGenreTab('furry')">Furry</button>
            </div>

            <div class="filter-panel">
                <div class="filter-row">
                    <select id="authorSelect" class="author-select" onchange="app.filterByAuthor(this.value)">
                        <option value="">Все авторы</option>
                    </select>
                    <button id="sortBtn" class="sort-btn" onclick="app.toggleSortPopular()">🔥 Популярные</button>
                    <button id="resetBtn" class="reset-btn" onclick="app.resetFilters()">Сбросить</button>
                </div>
            </div>

            <div class="catalog-grid" id="catalogGrid">Загрузка релизов...</div>
        </div>
    </div>

    <!-- ЭКРАН 2: ПРЕВЬЮ ТАЙТЛА + КОММЕНТАРИИ К ТАЙТЛУ -->
    <div id="previewScreen" class="screen">
        <div class="main-container">
            <button class="btn btn-like" onclick="app.showScreen('mainScreen')">← В каталог</button>
            <div class="preview-header">
                <img id="previewCover" class="preview-cover" src="" alt="">
                <div>
                    <h3 id="previewTitle" style="margin:0 0 5px 0;"></h3>
                    <p id="previewAuthor" style="color:#aaa; margin:0; font-size:14px;"></p>
                    <p id="previewLikesCount" style="margin:10px 0 0 0; font-weight:bold; font-size:14px; color:#00eb87;"></p>
                </div>
            </div>
            
            <button id="startReadBtn" class="btn">Читать перевод</button>
            <button id="likeBtn" class="btn btn-like">🤍 В список понравившегося</button>

            <!-- Комментарии к главной странице тайтла -->
            <div class="comments-section-title">Обсуждение тайтла</div>
            <div id="mainCommentsScroll" class="comments-scroll">Загрузка комментариев...</div>
            <div class="comment-input-block">
                <input type="text" id="mainCommentInputField" class="comment-input" placeholder="Написать комментарий к тайтлу...">
                <button class="btn" style="width:auto; margin:0; padding:10px 15px;" onclick="app.sendMainComment()">Отправить</button>
            </div>
        </div>
    </div>

    <!-- ЭКРАН 3: ГОРИЗОНТАЛЬНАЯ ЧИТАЛКА -->
    <div id="readerScreen" class="screen reader-screen">
        <div id="readerHeader" class="reader-header">
            <button class="sort-btn" style="color:#fff;" onclick="app.closeMangaReader()">✕ Выйти</button>
            <div class="page-counter" id="pageCounter">0 / 0</div>
            <button class="reader-donate-btn" onclick="tg.openLink('https://yoomoney.ru/to/4100117500602780')">☕ На кофе</button>
        </div>
        
        <div id="readerTrack" class="reader-track"></div>

        <!-- Постраничная шторка комментариев (вызывается свайпом вверх) -->
        <div id="commentsPanel" class="page-comments-panel">
            <div class="comments-header">
                <span id="commentsTitle" style="font-weight:bold; font-size:14px; color:#fff;">Комментарии</span>
                <span style="font-size:11px; color:#888;">Свайпните вниз, чтобы закрыть</span>
            </div>
            <div id="pageCommentsScroll" class="comments-scroll"></div>
            <div class="comment-input-block">
                <input type="text" id="pageCommentInputField" class="comment-input" placeholder="Написать комментарий к странице...">
                <button class="btn" style="width:auto; margin:0; padding:10px 15px;" onclick="reader.sendPageComment()">Отправить</button>
            </div>
        </div>
    </div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="api.js"></script>
<script src="reader.js"></script>
<script src="app.js"></script>
</body>
</html>
